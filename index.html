<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健タスク</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --teal:#00b5a3;--teal-d:#008f80;--teal-l:#e6f9f7;--teal-ll:#f0fdfb;
  --blue:#2563eb;--blue-l:#eff6ff;
  --purple:#7c3aed;--purple-l:#f5f3ff;
  --orange:#ea580c;--orange-l:#fff7ed;
  --red:#dc2626;--red-l:#fef2f2;
  --green:#16a34a;--green-l:#f0fdf4;
  --yellow:#ca8a04;--yellow-l:#fefce8;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g900:#0f172a;
  --r:14px;--r2:20px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08);
  --nav:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'TsukuARdGothic-Regular','筑紫A丸ゴシック','TsukuARdGothic','Tsukushi A Round Gothic',-apple-system,BlinkMacSystemFont,'Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif;
  font-size:18px;line-height:1.7;
  background:#f0f4f8;color:var(--g700);max-width:480px;margin:0 auto;
  min-height:100vh;padding-bottom:calc(var(--nav) + 8px);
}

/* ── Header ── */
.hdr{
  background:linear-gradient(135deg,#009e8f 0%,#00b5a3 60%,#00a5c4 100%);
  padding:14px 18px 18px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 10px rgba(0,150,140,.28);
}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{color:#fff;font-size:17px;font-weight:800;letter-spacing:.2px}
.hdr-sub{color:rgba(255,255,255,.78);font-size:12px;margin-top:2px}
.hdr-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden}

/* ── Bottom Nav ── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:#fff;
  border-top:1px solid var(--g200);display:flex;z-index:300;
  height:var(--nav);padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -2px 14px rgba(0,0,0,.07);
}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--g400);font-size:10px;font-weight:600;padding:6px 2px}
.ni.on{color:var(--teal)}
.ni .ic{font-size:21px;line-height:1;display:flex;align-items:center;justify-content:center}
.ni .ic svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nav) + 14px);right:18px;width:50px;height:50px;border-radius:50%;background:var(--teal);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(0,181,163,.38);display:flex;align-items:center;justify-content:center;z-index:201;transition:.18s}
.fab:active{transform:scale(.92)}
.fab.hide{display:none}

/* ── Screen ── */
.scr{display:none;padding:14px 14px 4px;animation:fi .18s ease}
.scr.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── Card ── */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:12px}
.card-t{font-size:17px;font-weight:700;color:var(--g700);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.card-t .i{font-size:18px}

/* ── Form ── */
.fg{margin-bottom:12px}
.fl{font-size:13px;font-weight:700;color:var(--g400);margin-bottom:5px;display:block;letter-spacing:.3px;text-transform:uppercase}
.fi{width:100%;padding:12px 13px;border-radius:10px;border:1.5px solid var(--g200);font-size:17px;color:var(--g900);background:#fff;font-family:inherit;transition:.18s}
.fi:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,181,163,.1)}
textarea.fi{resize:vertical;min-height:80px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border-radius:10px;border:none;cursor:pointer;font-size:16px;font-weight:700;transition:.15s;font-family:inherit;width:100%;margin-bottom:8px}
.btn-t{background:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(0,181,163,.28)}
.btn-t:active{background:var(--teal-d)}
.btn-g{background:var(--g100);color:var(--g600)}
.btn-sm{padding:8px 14px;font-size:14px;width:auto;margin-bottom:0}
.btn-del{background:var(--red-l);color:var(--red);border:1.5px solid #fecaca}

/* ── Modal ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:500;align-items:flex-end;justify-content:center}
.mo.on{display:flex;animation:fi .15s}
.ms{background:#fff;border-radius:22px 22px 0 0;padding:20px 18px 28px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:su .22s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ms-bar{width:34px;height:4px;background:var(--g200);border-radius:100px;margin:0 auto 18px}
.ms-title{font-size:19px;font-weight:800;color:var(--g900);margin-bottom:18px}

/* ── Pill ── */
.pl{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:13px;font-weight:700;white-space:nowrap}
.pl-t{background:var(--teal-l);color:var(--teal-d)}
.pl-b{background:var(--blue-l);color:var(--blue)}
.pl-r{background:var(--red-l);color:var(--red)}
.pl-g{background:var(--green-l);color:var(--green)}
.pl-y{background:var(--yellow-l);color:var(--yellow)}
.pl-gr{background:var(--g100);color:var(--g500)}

/* ── HOME ── */
.hero{background:linear-gradient(135deg,#009e8f,#00b5a3 55%,#00a5c4 100%);border-radius:var(--r2);padding:18px;color:#fff;margin-bottom:12px;box-shadow:0 5px 20px rgba(0,181,163,.22)}
.hero-name{font-size:22px;font-weight:800;margin-bottom:3px}
.hero-sub{font-size:15px;opacity:.82}
.hero-stats{display:flex;gap:10px;margin-top:14px}
.hs{flex:1;background:rgba(255,255,255,.18);border-radius:10px;padding:10px 8px;text-align:center}
.hs-v{font-size:22px;font-weight:800;line-height:1}
.hs-l{font-size:12px;opacity:.78;margin-top:2px}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.qc{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh);cursor:pointer;display:flex;flex-direction:column;gap:7px;border:1.5px solid transparent;transition:.15s}
.qc:active{transform:scale(.97)}
.qc.hi{border-color:var(--teal);background:var(--teal-ll)}
.qc .qi{font-size:24px}
.qc .ql{font-size:20px;font-weight:700;color:var(--g600)}
.qc .qv{font-size:24px;font-weight:800;color:var(--teal-d)}
.qc .qs{font-size:16px;color:var(--g400)}

.ncb{background:linear-gradient(135deg,var(--blue),#1d4ed8);border-radius:var(--r);padding:14px 16px;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 12px rgba(37,99,235,.22);cursor:pointer}
.ncb-ic{font-size:28px}
.ncb-info{flex:1}
.ncb-lbl{font-size:13px;opacity:.78;font-weight:600;margin-bottom:2px}
.ncb-dt{font-size:19px;font-weight:800}
.ncb-hp{font-size:14px;opacity:.8;margin-top:1px}
.ncb-d{background:rgba(255,255,255,.18);border-radius:8px;padding:7px 11px;text-align:center;font-size:14px;font-weight:700;flex-shrink:0;white-space:nowrap;min-width:56px}

/* ── TODO ── */
.todo-banner{background:linear-gradient(135deg,var(--purple),#6d28d9);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 3px 12px rgba(124,58,237,.22)}
.todo-banner-ic{font-size:26px}
.todo-banner-info{flex:1}
.todo-banner-t{font-size:18px;font-weight:800}
.todo-banner-s{font-size:14px;opacity:.8;margin-top:2px}
.todo-prog{background:rgba(255,255,255,.18);border-radius:8px;padding:6px 12px;text-align:center;font-size:16px;font-weight:800;flex-shrink:0;min-width:54px}

.todo-item{
  background:#fff;border-radius:var(--r);box-shadow:var(--sh);
  margin-bottom:8px;overflow:hidden;
  display:flex;align-items:stretch;
}
.todo-check-col{
  width:54px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  background:transparent;border:none;padding:0;
  transition:.15s;
}
.todo-check-col:active{background:var(--g100)}
.todo-cb{
  width:26px;height:26px;border-radius:8px;border:2px solid var(--g300);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:.2s;background:#fff;flex-shrink:0;
}
.todo-cb.done{background:var(--teal);border-color:var(--teal);color:#fff}
.todo-body{flex:1;padding:13px 12px 13px 0;min-width:0;cursor:pointer}
.todo-name{font-size:17px;font-weight:700;color:var(--g800);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.todo-name.done-txt{color:var(--g400);text-decoration:line-through}
.todo-freq{font-size:14px;color:var(--g400);margin-top:3px}
.todo-expand{display:none;margin-top:10px;border-top:1px solid var(--g100);padding-top:10px}
.todo-item.open .todo-expand{display:block}
.todo-exp-txt{font-size:15px;color:var(--g600);line-height:1.65}
.todo-exp-list{padding-left:14px;margin-top:6px}
.todo-exp-list li{font-size:15px;color:var(--g500);line-height:1.6}
.todo-prio-col{width:5px;flex-shrink:0}

.prio-high{background:var(--red)}
.prio-mid{background:var(--yellow)}
.prio-low{background:var(--teal)}

.todo-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tf-btn{padding:7px 16px;border-radius:100px;border:1.5px solid var(--g200);background:#fff;font-size:14px;font-weight:700;color:var(--g500);cursor:pointer;transition:.15s}
.tf-btn.on{border-color:var(--teal);background:var(--teal-l);color:var(--teal-d)}

.todo-legend{display:flex;gap:12px;margin-bottom:14px;font-size:13px;color:var(--g400);flex-wrap:wrap}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-item{display:flex;align-items:center;gap:4px}

.todo-progress-bar{background:var(--g100);border-radius:100px;height:6px;margin-bottom:4px;overflow:hidden}
.todo-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),#00c4b4);border-radius:100px;transition:.4s}

.todo-reset-row{display:flex;justify-content:flex-end;margin-bottom:12px}
.reset-btn{padding:6px 14px;border-radius:100px;border:1.5px solid var(--g200);background:#fff;font-size:11px;font-weight:700;color:var(--g500);cursor:pointer}

/* ── Weight ── */
.w-hero{background:linear-gradient(135deg,#009e8f,#00b5a3);border-radius:var(--r2);padding:18px;color:#fff;margin-bottom:12px;box-shadow:0 5px 18px rgba(0,181,163,.2)}
.w-val{font-size:44px;font-weight:900;line-height:1}
.w-unit{font-size:16px;opacity:.8}
.w-bmi{font-size:15px;background:rgba(255,255,255,.18);border-radius:8px;padding:5px 11px;margin-top:10px;display:inline-block}
.w-diff{font-size:14px;opacity:.82;margin-top:8px}
.chart-wrap{height:175px;position:relative;margin-top:4px}

.wli{display:flex;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid var(--g100)}
.wli:last-child{border-bottom:none}
.wli-dt{font-size:14px;color:var(--g400);min-width:84px}
.wli-w{font-size:19px;font-weight:800;color:var(--g800)}
.wli-b{font-size:13px;color:var(--g400)}
.wli-diff{margin-left:auto;font-size:13px;font-weight:700;padding:2px 8px;border-radius:100px}
.d-up{background:var(--orange-l);color:var(--orange)}
.d-dn{background:var(--green-l);color:var(--green)}
.wli-del{background:none;border:none;cursor:pointer;font-size:15px;color:var(--g300);padding:4px}

/* ── Checkup ── */
.ck-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.ck-hd{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
.ck-dt{font-size:15px;font-weight:700;color:var(--g800)}
.ck-hp{font-size:13px;color:var(--g400);margin-top:2px}
.ck-ch{margin-left:auto;color:var(--g300);font-size:14px;transition:.2s}
.ck-card.open .ck-ch{transform:rotate(180deg)}
.ck-bd{display:none;padding:0 14px 14px;border-top:1px solid var(--g100)}
.ck-card.open .ck-bd{display:block}
.ck-st{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px}
.ck-txt{font-size:14px;color:var(--g600);line-height:1.7;white-space:pre-wrap}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pt{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;background:var(--g100)}
.pt img{width:100%;height:100%;object-fit:cover}
.pt-l{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ck-acts{display:flex;gap:8px;margin-top:12px}

.pua{border:2px dashed var(--g300);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.18s;color:var(--g400);font-size:13px;background:var(--g50)}
.pua:active{border-color:var(--teal);background:var(--teal-ll)}
.ppg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.ppi{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background:var(--g100)}
.ppi img{width:100%;height:100%;object-fit:cover}
.ppi-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ppi-l{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.48);color:#fff;border:none;font-size:9px;padding:2px 4px;font-family:inherit;text-align:center;width:100%}

/* ── Schedule ── */
.si{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:11px}
.si-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-dt{font-size:16px;font-weight:800;color:var(--g800)}
.si-hp{font-size:13px;color:var(--g500);margin-top:2px;display:flex;align-items:center;gap:4px}
.si-note{font-size:12px;color:var(--g400);margin-top:3px}
.si-st{margin-top:6px}
.dc{font-size:12px;font-weight:700;padding:3px 9px;border-radius:100px;white-space:nowrap}

/* ── Profile ── */
.p-hd{background:linear-gradient(135deg,var(--teal),#009e8f);border-radius:14px;padding:18px;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.p-av{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid rgba(255,255,255,.38)}
.p-nm{font-size:18px;font-weight:800}
.p-ag{font-size:12px;opacity:.82;margin-top:2px}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(var(--nav) + 14px);left:50%;transform:translateX(-50%);background:var(--g800);color:#fff;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;z-index:400;opacity:0;pointer-events:none;transition:.25s;white-space:nowrap}
.toast.show{opacity:1}

.empty{text-align:center;padding:36px 16px;color:var(--g400)}
.ei{font-size:40px;margin-bottom:8px}
.et{font-size:14px;font-weight:600;color:var(--g500)}
.es{font-size:12px;margin-top:3px}

/* judgment */
.jNormal{background:#eff6ff;color:#1d4ed8}.jWatch{background:#fefce8;color:#a16207}.jRecheck{background:#fff7ed;color:#c2410c}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr" id="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-title">健タスク</div>
      <div class="hdr-sub" id="hdr-sub">あなたの健康をサポート</div>
    </div>
    <div class="hdr-avatar" onclick="openProfile()"><svg width="40" height="40" viewBox="215 50 250 250" xmlns="http://www.w3.org/2000/svg">
  <rect x="215" y="50" width="250" height="250" rx="58" fill="#0D9E6A"/>
  <defs><clipPath id="fc"><rect x="215" y="50" width="250" height="250" rx="58"/></clipPath></defs>
  <g clip-path="url(#fc)"><circle cx="340" cy="340" r="130" fill="#0B8A5C"/></g>
  <path d="M340 228 C340 228 278 188 278 150 C278 126 296 112 314 116 C322 118 330 126 340 142 C350 126 358 118 366 116 C384 112 402 126 402 150 C402 188 340 228 340 228Z" fill="white"/>
  <polyline points="248,208 272,208 287,178 302,236 315,196 330,208 362,208 384,208" fill="none" stroke="#80DEEA" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg></div>
  </div>
</div>

<!-- SCREENS -->

<!-- HOME -->
<div class="scr on" id="s-home">
  <div id="home-hero"></div>
  <div class="qg" id="home-qg"></div>
  <div id="home-ncb"></div>
  <div id="home-todo-banner"></div>
  <div style="font-size:11px;font-weight:700;color:var(--g400);letter-spacing:.4px;margin-bottom:8px;text-transform:uppercase">最近の記録</div>
  <div id="home-recent"></div>
</div>

<!-- TODO -->
<div class="scr" id="s-todo">
  <div id="todo-profile-warn"></div>
  <div id="todo-prog-area"></div>
  <div class="todo-legend">
    <div class="tl-item"><div class="tl-dot prio-high"></div>優先度：高</div>
    <div class="tl-item"><div class="tl-dot prio-mid"></div>優先度：中</div>
    <div class="tl-item"><div class="tl-dot prio-low"></div>定期</div>
  </div>
  <div class="todo-filter" id="todo-filter">
    <button class="tf-btn on" onclick="filterTodo('all',this)">すべて</button>
    <button class="tf-btn" onclick="filterTodo('undone',this)">未完了</button>
    <button class="tf-btn" onclick="filterTodo('done',this)">完了済</button>
    <button class="tf-btn" onclick="filterTodo('high',this)">🔴 優先高</button>
  </div>
  <div id="todo-list"></div>
  <div class="card" style="margin-top:4px">
    <div class="card-t"><span class="i">➕</span>検診項目を追加</div>
    <div class="fr">
      <div class="fg"><label class="fl">項目名</label><input class="fi" type="text" id="ct-name" placeholder="例：甲状腺検査"></div>
      <div class="fg"><label class="fl">頻度</label><input class="fi" type="text" id="ct-freq" placeholder="例：年1回"></div>
    </div>
    <div class="fg"><label class="fl">優先度</label>
      <select class="fi" id="ct-prio"><option value="high">🔴 高</option><option value="mid" selected>🟡 中</option><option value="low">🟢 定期</option></select>
    </div>
    <div class="fg"><label class="fl">メモ（任意）</label><input class="fi" type="text" id="ct-why" placeholder="追加した理由など"></div>
    <button class="btn btn-t" onclick="addCustomTodo()">追加する</button>
  </div>
</div>

<!-- WEIGHT -->
<div class="scr" id="s-weight">
  <div id="w-hero"></div>
  <div class="card">
    <div class="card-t"><span class="i">➕</span>体重を記録</div>
    <div class="fr">
      <div class="fg"><label class="fl">日付</label><input class="fi" type="date" id="w-date"></div>
      <div class="fg"><label class="fl">体重 (kg)</label><input class="fi" type="number" id="w-kg" placeholder="65.0" step="0.1"></div>
    </div>
    <div class="fg"><label class="fl">メモ（任意）</label><input class="fi" type="text" id="w-memo" placeholder="朝食前、運動後など"></div>
    <button class="btn btn-t" onclick="saveWeight()">💾 記録する</button>
  </div>
  <div class="card" id="w-chart-card" style="display:none">

    <div class="chart-wrap"><canvas id="wChart"></canvas></div>
  </div>
  <div class="card"><div class="card-t"><span class="i">📋</span>記録一覧</div><div id="w-list"></div></div>
</div>

<div class="scr" id="s-ck"><div id="ck-list"></div></div>

<!-- SCHEDULE -->
<div class="scr" id="s-sch">

    <div class="fg"><label class="fl">予定日</label><input class="fi" type="date" id="s-date"></div>
    <div class="fg"><label class="fl">病院・施設名</label><input class="fi" type="text" id="s-hosp" placeholder="○○クリニック"></div>

      <div class="fg"><label class="fl">状態</label>
        <select class="fi" id="s-status"><option value="plan">📌 予定</option><option value="reserved">✅ 予約済</option><option value="done">☑️ 完了</option></select>
      </div>
      <div class="fg"><label class="fl">種類・メモ</label><input class="fi" type="text" id="s-type" placeholder="定期健診など"></div>

</div>

<!-- FAB -->
<button class="fab hide" id="fab" onclick="onFab()">＋</button>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="ni on" onclick="sw('home',this)"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>ホーム</button>
  <button class="ni" onclick="sw('todo',this)"><span class="ic"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/><path d="M7 7l0 0"/></svg></span>受診TODO</button>
  <button class="ni" onclick="sw('weight',this)"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18A9 9 0 0012 3z"/><path d="M12 8v4l3 2"/><path d="M6.5 6.5l1 1M17.5 6.5l-1 1"/></svg></span>体重</button>
  <button class="ni" onclick="sw('ck',this)"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="10" width="18" height="11" rx="1"/><path d="M7 10V7a5 5 0 0110 0v3"/><path d="M9 10v11M15 10v11"/><path d="M3 14h18"/><path d="M12 6v0" stroke-width="2"/></svg></span>健診</button>
  <button class="ni" onclick="sw('sch',this)"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></svg></span>予定</button>
</nav>

<!-- MODALS -->

<!-- Profile -->
<div class="mo" id="m-profile">
  <div class="ms" onclick="e=>e.stopPropagation()">
    <div class="ms-bar"></div>
    <div class="p-hd">
      <div class="p-av">👤</div>
      <div><div class="p-nm" id="p-dn">プロフィール</div><div class="p-ag" id="p-da"></div></div>
    </div>
    <div class="fg"><label class="fl">お名前</label><input class="fi" type="text" id="p-name" placeholder="山田 恵"></div>
    <div class="fr">
      <div class="fg"><label class="fl">生年月日</label><input class="fi" type="date" id="p-birth"></div>
      <div class="fg"><label class="fl">性別</label>
        <select class="fi" id="p-sex"><option value="">選択</option><option value="female">女性</option><option value="male">男性</option><option value="other">その他</option></select>
      </div>
    </div>
    <div class="fg"><label class="fl">身長 (cm)※BMI計算用</label><input class="fi" type="number" id="p-h" placeholder="165"></div>
    <button class="btn btn-t" onclick="saveProfile()">✅ 保存する</button>
    <button class="btn btn-g" onclick="cm('m-profile')">キャンセル</button>
  </div>
</div>

<!-- Checkup modal -->
<div class="mo" id="m-ck">
  <div class="ms">
    <div class="ms-bar"></div>
    <div class="ms-title" style="display:flex;align-items:center;gap:8px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="18" height="11" rx="1"/><path d="M7 10V7a5 5 0 0110 0v3"/><path d="M9 10v11M15 10v11"/><path d="M3 14h18"/></svg> 健診結果を記録</div>
    <input type="hidden" id="cm-id">
    <div class="fg"><label class="fl">受診日</label><input class="fi" type="date" id="cm-date"></div>
    <div class="fg"><label class="fl">病院・施設名</label><input class="fi" type="text" id="cm-hosp" placeholder="○○クリニック"></div>
    <div class="fg"><label class="fl">総合判定</label>
      <select class="fi" id="cm-jg">
        <option value="">選択</option><option value="normal">🔵 異常なし</option><option value="watch">🟡 経過観察</option><option value="recheck">🟠 再検査</option>
      </select>
    </div>
    <div class="fg"><label class="fl">所見・医師コメント</label><textarea class="fi" id="cm-find" placeholder="指摘事項をメモ"></textarea></div>
    <div class="fg">
      <label class="fl">📷 検査結果写真（複数可）</label>
      <div class="pua" onclick="document.getElementById('cm-fp').click()"><div style="font-size:22px;margin-bottom:4px">📁</div>タップして写真を追加<input type="file" id="cm-fp" accept="image/*" multiple style="display:none" onchange="hPhotos(event)"></div>
      <div class="ppg" id="ppg"></div>
    </div>
    <button class="btn btn-t" onclick="saveCk()">💾 保存する</button>
    <button class="btn btn-g" onclick="cm('m-ck')">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ STATE ═══
let D=JSON.parse(localStorage.getItem('hm4')||'{"profile":{},"weights":[],"checkups":[],"schedules":[],"todoChecked":{},"customTodos":[]}');
if(!D.customTodos)D.customTodos=[];
let PP=[]; // pending photos
let WC=null; // weight chart
let curScr='home';
let todoFilter='all';

function save(){localStorage.setItem('hm4',JSON.stringify(D));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function cm(id){document.getElementById(id).classList.remove('on');}
function fmt(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日';}
function dTo(d){const n=new Date();n.setHours(0,0,0,0);return Math.round((new Date(d+'T00:00:00')-n)/86400000);}
function calcAge(b){if(!b)return null;const n=new Date(),bd=new Date(b);let a=n.getFullYear()-bd.getFullYear();if(n.getMonth()<bd.getMonth()||(n.getMonth()===bd.getMonth()&&n.getDate()<bd.getDate()))a--;return a;}
function bmi(w,h){return h?(w/((h/100)**2)).toFixed(1):null;}
function bmiL(b){b=parseFloat(b);if(b<18.5)return'低体重';if(b<25)return'標準';if(b<30)return'過体重';return'肥満';}

// ═══ NAV ═══
function sw(name,el){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+name).classList.add('on');
  if(el)el.classList.add('on');
  curScr=name;
  const fabScreens=['weight','ck','sch'];
  document.getElementById('fab').classList.toggle('hide',!fabScreens.includes(name));
  if(name==='home')renderHome();
  if(name==='todo')renderTodo();
  if(name==='weight')renderWeight();
  if(name==='ck')renderCk();
  if(name==='sch')renderSch();
}
function onFab(){
  if(curScr==='ck')openCkModal();
  else if(curScr==='sch')document.getElementById('s-date').focus();
  else if(curScr==='weight')document.getElementById('w-kg').focus();
}

// ═══ PROFILE ═══
function openProfile(){
  const p=D.profile;
  document.getElementById('p-name').value=p.name||'';
  document.getElementById('p-birth').value=p.birth||'';
  document.getElementById('p-sex').value=p.sex||'';
  document.getElementById('p-h').value=p.height||'';
  updateProfileDisplay();
  document.getElementById('m-profile').classList.add('on');
}
function saveProfile(){
  D.profile={name:document.getElementById('p-name').value,birth:document.getElementById('p-birth').value,sex:document.getElementById('p-sex').value,height:document.getElementById('p-h').value};
  // Reset todo when profile changes (regenerate)
  if(D._lastProfileAge!==calcAge(D.profile.birth)||D._lastProfileSex!==D.profile.sex){
    D.todoChecked={};
    D._lastProfileAge=calcAge(D.profile.birth);
    D._lastProfileSex=D.profile.sex;
  }
  save();cm('m-profile');renderHome();updateHdr();renderTodo();toast('プロフィールを保存しました ✅');
}
function updateProfileDisplay(){
  const p=D.profile;const a=calcAge(p.birth);
  document.getElementById('p-dn').textContent=p.name||'プロフィール';
  document.getElementById('p-da').textContent=[a?a+'歳':'',p.sex==='female'?'女性':p.sex==='male'?'男性':''].filter(Boolean).join(' · ');
}
function updateHdr(){
  const p=D.profile;
  document.getElementById('hdr-sub').textContent=p.name?p.name+'さんの健康記録':'あなたの健康をサポート';
}

// ═══ HOME ═══
function renderHome(){
  updateHdr();
  const p=D.profile,a=calcAge(p.birth);
  const ws=[...D.weights].sort((a,b)=>b.date.localeCompare(a.date));
  const lw=ws[0],h=p.height;
  const b=lw&&h?bmi(lw.weight,h):null;
  const recs=[...getRecommendations(a,p.sex||'female'),...D.customTodos];
  const done=recs.filter(r=>D.todoChecked[r.id]).length;

  document.getElementById('home-hero').innerHTML=`
    <div class="hero">
      <div class="hero-name">${p.name?p.name+'さん、こんにちは！':'こんにちは！'}</div>
      <div class="hero-sub">今日も健康チェックを続けましょう</div>
      <div class="hero-stats">
        <div class="hs"><div class="hs-v">${lw?lw.weight+'<small style="font-size:11px">kg</small>':'—'}</div><div class="hs-l">最新体重</div></div>
        <div class="hs"><div class="hs-v">${b||'—'}</div><div class="hs-l">BMI</div></div>
        <div class="hs"><div class="hs-v">${D.weights.length}</div><div class="hs-l">記録日数</div></div>
        ${a?`<div class="hs"><div class="hs-v">${a}</div><div class="hs-l">歳</div></div>`:''}
      </div>
    </div>`;

  const latCk=[...D.checkups].sort((a,b)=>b.date.localeCompare(a.date))[0];
  document.getElementById('home-qg').innerHTML=`
    <div class="qc hi" onclick="sw('weight',document.querySelectorAll('.ni')[2])">
      <div class="qi">⚖️</div><div class="ql">体重を記録</div>
      ${lw?`<div class="qv">${lw.weight} kg</div><div class="qs">${fmt(lw.date)}</div>`:'<div class="qs">まだ記録なし</div>'}
    </div>
    <div class="qc" onclick="sw('ck',document.querySelectorAll('.ni')[3])">
      <div class="qi"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="18" height="11" rx="1"/><path d="M7 10V7a5 5 0 0110 0v3"/><path d="M9 10v11M15 10v11M3 14h18"/></svg></div><div class="ql">健診結果</div>
      ${latCk?`<div class="qv" style="font-size:14px">${{normal:'🔵 異常なし',watch:'🟡 経過観察',recheck:'🟠 再検査'}[latCk.judgment]||latCk.judgment||'—'}</div><div class="qs">${fmt(latCk.date)}</div>`:'<div class="qs">まだ記録なし</div>'}
    </div>
    <div class="qc" onclick="sw('todo',document.querySelectorAll('.ni')[1])">
      <div class="qi">✅</div><div class="ql">受診TODO</div>
      ${a?`<div class="qv" style="font-size:14px">${done}/${recs.length}</div><div class="qs">完了済</div>`:'<div class="qs">プロフィールを設定</div>'}
    </div>
    <div class="qc" onclick="sw('sch',document.querySelectorAll('.ni')[4])">
      <div class="qi">📅</div><div class="ql">予定管理</div>
      <div class="qs">${D.schedules.filter(s=>s.status!=='done').length}件の予定</div>
    </div>`;

  const nxt=D.schedules.filter(s=>s.status!=='done').sort((a,b)=>a.date.localeCompare(b.date))[0];
  document.getElementById('home-ncb').innerHTML=nxt?`
    <div class="ncb" onclick="sw('sch',document.querySelectorAll('.ni')[4])">
      <div class="ncb-ic">🏥</div>
      <div class="ncb-info">
        <div class="ncb-lbl">次回の健康診断</div>
        <div class="ncb-dt">${fmt(nxt.date)}</div>
        <div class="ncb-hp">${nxt.hospital||'病院未設定'}${nxt.note?' · '+nxt.note:''}</div>
      </div>
      <div class="ncb-d">${(()=>{const d=dTo(nxt.date);return d<0?`${Math.abs(d)}日前`:d===0?'今日！':`あと<br>${d}日`;})()}</div>
    </div>`:'';

  // TODO banner
  if(a&&recs.length){
    const pct=Math.round(done/recs.length*100);
    document.getElementById('home-todo-banner').innerHTML=`
      <div class="todo-banner" onclick="sw('todo',document.querySelectorAll('.ni')[1])">
        <div class="todo-banner-ic">📋</div>
        <div class="todo-banner-info">
          <div class="todo-banner-t">${a}歳向け受診チェックリスト</div>
          <div class="todo-banner-s">${recs.length}項目中 ${done}項目完了</div>
          <div style="margin-top:8px;background:rgba(255,255,255,.25);border-radius:100px;height:5px;overflow:hidden">
            <div style="height:100%;background:#fff;border-radius:100px;width:${pct}%;transition:.4s"></div>
          </div>
        </div>
        <div class="todo-prog">${pct}%</div>
      </div>`;
  } else {
    document.getElementById('home-todo-banner').innerHTML=`
      <div class="ncb" style="background:linear-gradient(135deg,var(--purple),#6d28d9);box-shadow:0 3px 12px rgba(124,58,237,.22)" onclick="openProfile()">
        <div class="ncb-ic">🤖</div>
        <div class="ncb-info"><div class="ncb-lbl">AI受診TODO</div><div class="ncb-dt" style="font-size:14px">プロフィールを設定すると</div><div class="ncb-hp">年齢別チェックリストが作成されます</div></div>
        <div class="ncb-d" style="font-size:12px">設定→</div>
      </div>`;
  }

  const recW=ws.slice(0,3);
  document.getElementById('home-recent').innerHTML=recW.length?recW.map(w=>`
    <div class="card" style="padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
      <span style="font-size:17px">⚖️</span>
      <div style="flex:1"><div style="font-size:14px;font-weight:700">${w.weight} kg</div><div style="font-size:11px;color:var(--g400)">${fmt(w.date)}${w.memo?' · '+w.memo:''}</div></div>
      ${h?`<span class="pl pl-t">BMI ${bmi(w.weight,h)}</span>`:''}
    </div>`).join(''):
    `<div class="card" style="padding:14px;color:var(--g400);font-size:13px;text-align:center">まだ記録がありません</div>`;
}

// ═══ TODO ═══
function filterTodo(f,el){
  todoFilter=f;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('on'));
  if(el)el.classList.add('on');
  renderTodoList();
}

function renderTodo(){
  const p=D.profile,a=calcAge(p.birth);
  if(!a||!p.sex){
    document.getElementById('todo-profile-warn').innerHTML=`
      <div class="card" style="text-align:center;padding:24px;margin-bottom:12px">
        <div style="font-size:36px;margin-bottom:10px">🤖</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">プロフィールを設定してください</div>
        <div style="font-size:13px;color:var(--g400);margin-bottom:14px">年齢・性別を登録すると、あなたに合った受診チェックリストが自動作成されます</div>
        <button class="btn btn-t" style="max-width:200px;margin:0 auto" onclick="openProfile()">プロフィールを設定 →</button>
      </div>`;
    document.getElementById('todo-prog-area').innerHTML='';
    document.getElementById('todo-list').innerHTML='';
    return;
  }
  document.getElementById('todo-profile-warn').innerHTML='';
  const recs=[...getRecommendations(a,p.sex),...D.customTodos];
  const done=recs.filter(r=>D.todoChecked[r.id]).length;
  const pct=recs.length?Math.round(done/recs.length*100):0;

  document.getElementById('todo-prog-area').innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-size:15px;font-weight:800">${a}歳 ${p.sex==='female'?'女性':'男性'}の受診チェックリスト</div>
          <div style="font-size:12px;color:var(--g400);margin-top:2px">${recs.length}項目中 ${done}項目完了</div>
        </div>
        <div style="font-size:28px;font-weight:900;color:${pct===100?'var(--teal)':'var(--g700)'}">${pct}<span style="font-size:14px;font-weight:600">%</span></div>
      </div>
      <div class="todo-progress-bar"><div class="todo-progress-fill" style="width:${pct}%"></div></div>
      ${pct===100?`<div style="text-align:center;margin-top:10px;font-size:13px;color:var(--teal);font-weight:700">🎉 すべて完了！お疲れさまです</div>`:''}
      <div style="display:flex;justify-content:flex-end;margin-top:10px">
        <button onclick="resetTodo()" style="padding:5px 12px;border-radius:100px;border:1.5px solid var(--g200);background:#fff;font-size:11px;font-weight:700;color:var(--g400);cursor:pointer">リセット</button>
      </div>
    </div>`;

  renderTodoList();
}

function renderTodoList(){
  const p=D.profile,a=calcAge(p.birth);
  if(!a)return;
  const recs=[...getRecommendations(a,p.sex),...D.customTodos];
  let filtered=recs;
  if(todoFilter==='undone')filtered=recs.filter(r=>!D.todoChecked[r.id]);
  else if(todoFilter==='done')filtered=recs.filter(r=>D.todoChecked[r.id]);
  else if(todoFilter==='high')filtered=recs.filter(r=>r.priority==='high');

  if(!filtered.length){
    document.getElementById('todo-list').innerHTML='<div class="empty"><div class="ei">✅</div><div class="et">該当なし</div></div>';
    return;
  }
  const prioOrder={high:0,mid:1,low:2};
  filtered.sort((a,b)=>prioOrder[a.priority]-prioOrder[b.priority]);
  document.getElementById('todo-list').innerHTML=filtered.map(r=>{
    const checked=!!D.todoChecked[r.id];
    return`<div class="todo-item${checked?' done-item':''}" id="ti-${r.id}">
      <div class="todo-prio-col prio-${r.priority}"></div>
      <button class="todo-check-col" onclick="toggleTodo('${r.id}')">
        <div class="todo-cb${checked?' done':''}">${checked?'✓':''}</div>
      </button>
      <div class="todo-body" onclick="expandTodo('${r.id}')">
        <div class="todo-name${checked?' done-txt':''}">${r.icon} ${r.name}${r.priority==='high'?` <span class="pl pl-r" style="font-size:9px">優先高</span>`:''}${r.custom?` <span class="pl pl-gr" style="font-size:9px">自己追加</span>`:''}
        </div>
        <div class="todo-freq">📅 ${r.freq}</div>
        <div class="todo-expand" id="te-${r.id}">
          <div class="todo-exp-txt">${r.why}</div>
          ${r.what?`<ul class="todo-exp-list">${r.what.map(w=>`<li>${w}</li>`).join('')}</ul>`:''}
          ${r.tip?`<div style="margin-top:8px;padding:8px 10px;background:var(--teal-ll);border-radius:8px;font-size:11px;color:var(--teal-d);line-height:1.5">💡 ${r.tip}</div>`:''}
          <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
            <button onclick="addToScheduleFromTodo('${r.name}')" style="padding:7px 14px;border-radius:100px;border:1.5px solid var(--teal);background:var(--teal-ll);font-size:12px;font-weight:700;color:var(--teal-d);cursor:pointer">📅 予定に追加する</button>
            ${r.custom?`<button onclick="delCustomTodo('${r.id}')" style="padding:7px 14px;border-radius:100px;border:1.5px solid #fecaca;background:var(--red-l);font-size:12px;font-weight:700;color:var(--red);cursor:pointer">🗑 削除</button>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleTodo(id){
  if(D.todoChecked[id])delete D.todoChecked[id];
  else D.todoChecked[id]=true;
  save();renderTodo();
}
function expandTodo(id){
  const el=document.getElementById('ti-'+id);
  if(el)el.classList.toggle('open');
}
function resetTodo(){
  if(!confirm('チェックをすべてリセットしますか？'))return;
  D.todoChecked={};save();renderTodo();toast('リセットしました');
}
function addCustomTodo(){
  const name=document.getElementById('ct-name').value.trim();
  const freq=document.getElementById('ct-freq').value.trim()||'任意';
  const prio=document.getElementById('ct-prio').value;

// ═══ WEIGHT ═══
function saveWeight(){
  const date=document.getElementById('w-date').value,kg=document.getElementById('w-kg').value,memo=document.getElementById('w-memo').value;
  if(!date||!kg){toast('日付と体重を入力してください');return;}
  D.weights.push({id:Date.now(),date,weight:parseFloat(kg),memo});
  save();document.getElementById('w-kg').value='';document.getElementById('w-memo').value='';
  renderWeight();renderHome();toast('体重を記録しました ✅');
}
function delWeight(id){if(!confirm('削除しますか？'))return;D.weights=D.weights.filter(w=>w.id!==id);save();renderWeight();renderHome();}
function renderWeight(){
  const sorted=[...D.weights].sort((a,b)=>b.date.localeCompare(a.date));
  const h=D.profile.height,lw=sorted[0],pw=sorted[1];
  const diff=lw&&pw?(lw.weight-pw.weight).toFixed(1):null;
  const b=lw&&h?bmi(lw.weight,h):null;
  document.getElementById('w-hero').innerHTML=lw?`
    <div class="w-hero">
      <div style="font-size:12px;opacity:.75;margin-bottom:4px">最新体重</div>
      <div class="w-val">${lw.weight}<span class="w-unit"> kg</span></div>
      <div style="font-size:12px;opacity:.75;margin-top:4px">${fmt(lw.date)}${lw.memo?' · '+lw.memo:''}</div>
      ${b?`<div class="w-bmi">BMI ${b}（${bmiL(b)}）</div>`:''}
      ${diff!==null?`<div class="w-diff">${diff>0?'▲':'▼'} ${Math.abs(diff)} kg（前回比）</div>`:''}
    </div>`:'';

  if(sorted.length>1){
    document.getElementById('w-chart-card').style.display='block';
    const cd=[...D.weights].sort((a,b)=>a.date.localeCompare(b.date));
    if(WC)WC.destroy();
    const h2=D.profile.height;
    const normalMin=h2?parseFloat((18.5*(h2/100)**2).toFixed(1)):null;
    const normalMax=h2?parseFloat((25*(h2/100)**2).toFixed(1)):null;
    const ptColors=cd.map(w=>{
      if(!h2)return'#00b5a3';
      const b2=parseFloat(bmi(w.weight,h2));
      return(b2>=18.5&&b2<25)?'#00b5a3':'#dc2626';
    });
    const zoneBgPlugin={
      id:'weightZone',
      beforeDraw(chart){
        if(!normalMin||!normalMax)return;
        const{ctx,chartArea,scales}=chart;
        const{top,bottom,left,right}=chartArea;
        const yNMax=scales.y.getPixelForValue(normalMax);
        const yNMin=scales.y.getPixelForValue(normalMin);
        ctx.save();
        ctx.fillStyle='rgba(220,38,38,0.07)';
        if(yNMax>top)ctx.fillRect(left,top,right-left,Math.max(0,yNMax-top));
        if(yNMin<bottom)ctx.fillRect(left,yNMin,right-left,Math.max(0,bottom-yNMin));
        ctx.restore();
      }
    };
    WC=new Chart(document.getElementById('wChart').getContext('2d'),{
      type:'line',
      data:{labels:cd.map(w=>fmt(w.date).replace('年','/').replace('月','/').replace('日','')),
        datasets:[{data:cd.map(w=>w.weight),borderColor:'#00b5a3',backgroundColor:'rgba(0,181,163,.07)',tension:.35,pointRadius:5,pointBackgroundColor:ptColors,pointBorderColor:ptColors,fill:true,
          segment:{borderColor:ctx=>{if(!normalMin||!normalMax)return'#00b5a3';const v0=ctx.p0.parsed.y,v1=ctx.p1.parsed.y;return(v0<normalMin||v0>=normalMax||v1<normalMin||v1>=normalMax)?'#ef4444':'#00b5a3';}}}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>{const w=cd[ctx.dataIndex];const bl=h2?` / BMI ${bmi(w.weight,h2)}（${bmiL(bmi(w.weight,h2))}）`:'';return ctx.parsed.y+'kg'+bl;}}}},
        scales:{y:{ticks:{callback:v=>v+'kg'},grid:{color:'#f1f5f9'}},x:{grid:{display:false},ticks:{maxTicksLimit:6}}}},
      plugins:[zoneBgPlugin]
    });
  } else document.getElementById('w-chart-card').style.display='none';

  const listEl=document.getElementById('w-list');
  if(!sorted.length){listEl.innerHTML='<div class="empty"><div class="ei">⚖️</div><div class="et">まだ記録がありません</div></div>';return;}
  listEl.innerHTML=sorted.map((w,i)=>{
    const p=sorted[i+1],d=p?(w.weight-p.weight).toFixed(1):null;
    const b2=h?bmi(w.weight,h):null;
    return`<div class="wli">
      <div class="wli-dt">${fmt(w.date)}</div>
      <div><div class="wli-w">${w.weight} kg</div>${b2?`<div class="wli-b">BMI ${b2}</div>`:''}</div>
      ${w.memo?`<div style="flex:1;font-size:11px;color:var(--g400);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">${w.memo}</div>`:'<div style="flex:1"></div>'}
      ${d!==null?`<span class="wli-diff ${parseFloat(d)>0?'d-up':'d-dn'}">${parseFloat(d)>0?'+':''}${d}</span>`:''}
      <button class="wli-del" onclick="delWeight(${w.id})">🗑</button>
    </div>`;
  }).join('');
}

    <div class="ck-card" id="cc-${ck.id}">
      <div class="ck-hd" onclick="document.getElementById('cc-${ck.id}').classList.toggle('open')">
        <div><div class="ck-dt">${fmt(ck.date)}</div><div class="ck-hp">🏥 ${ck.hospital||'病院未設定'}</div></div>
        ${ck.judgment?`<span class="pl ${jC[ck.judgment]}" style="margin-left:auto;margin-right:8px">${jL[ck.judgment]||ck.judgment}</span>`:'<div style="flex:1"></div>'}
        <div class="ck-ch">▼</div>
      </div>
      <div class="ck-bd">
        ${ck.finding?`<div class="ck-st">所見・コメント</div><div class="ck-txt">${ck.finding}</div>`:''}
        ${ck.photos&&ck.photos.length?`<div class="ck-st">📷 検査結果写真（${ck.photos.length}枚）</div><div class="pg">${ck.photos.map(p=>`<div class="pt" onclick="window.open().document.write('<img src=\\'${p.dataUrl}\\' style=\\'max-width:100%\\'>');void 0"><img src="${p.dataUrl}"><div class="pt-l">${p.label}</div></div>`).join('')}</div>`:''}
        <div class="ck-acts">
          <button class="btn btn-t btn-sm" onclick="openCkModal(${ck.id})">✏️ 編集</button>
          <button class="btn btn-del btn-sm" onclick="delCk(${ck.id})">削除</button>
        </div>
      </div>
    </div>`).join('');
}

// ═══ SCHEDULE ═══
function saveSchedule(){
  const date=document.getElementById('s-date').value;if(!date){toast('予定日を入力してください');return;}
  D.schedules.push({id:Date.now(),date,hospital:document.getElementById('s-hosp').value,status:document.getElementById('s-status').value,note:document.getElementById('s-type').value});
  save();document.getElementById('s-hosp').value='';document.getElementById('s-type').value='';document.getElementById('s-status').value='plan';
  renderSch();renderHome();toast('予定を追加しました ✅');
}
function delSch(id){if(!confirm('削除しますか？'))return;D.schedules=D.schedules.filter(s=>s.id!==id);save();renderSch();renderHome();}
function cycleSt(id){const s=D.schedules.find(s=>s.id===id);if(!s)return;const c=['plan','reserved','done'];s.status=c[(c.indexOf(s.status)+1)%3];save();renderSch();renderHome();}
function renderSch(){
  const el=document.getElementById('sch-list');
  const sorted=[...D.schedules].sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length){el.innerHTML='<div class="empty"><div class="ei">📅</div><div class="et">予定を追加しましょう</div></div>';return;}
  const sL={plan:'📌 予定',reserved:'✅ 予約済',done:'☑️ 完了'};
  const sC={plan:'var(--teal)',reserved:'var(--blue)',done:'var(--g300)'};
  const sBg={plan:'var(--teal-l)',reserved:'var(--blue-l)',done:'var(--g100)'};
  const sTx={plan:'var(--teal-d)',reserved:'var(--blue)',done:'var(--g500)'};
  el.innerHTML=sorted.map(s=>{
    const d=dTo(s.date);
    let dc='var(--g100)',dt='var(--g400)',dl='完了';
    if(s.status!=='done'){
      if(d<0){dc='var(--g100)';dt='var(--g400)';dl=`${Math.abs(d)}日前`;}
      else if(d===0){dc='#fef2f2';dt='var(--red)';dl='今日！';}
      else if(d<7){dc='var(--red-l)';dt='var(--red)';dl=`あと${d}日`;}
      else if(d<30){dc='var(--yellow-l)';dt='var(--yellow)';dl=`あと${d}日`;}
      else{dc='var(--green-l)';dt='var(--green)';dl=`あと${d}日`;}
    }
    return`<div class="si">
      <div class="si-dot" style="background:${sC[s.status]}"></div>
      <div class="si-info">
        <div class="si-dt">${fmt(s.date)}</div>
        ${s.hospital?`<div class="si-hp">🏥 ${s.hospital}</div>`:''}
        ${s.note?`<div class="si-note">📝 ${s.note}</div>`:''}
        <div class="si-st"><span class="pl" style="background:${sBg[s.status]};color:${sTx[s.status]};cursor:pointer" onclick="cycleSt(${s.id})">${sL[s.status]}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <span class="dc" style="background:${dc};color:${dt}">${dl}</span>
        <button class="wli-del" onclick="delSch(${s.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ═══ INIT ═══
document.getElementById('w-date').value=new Date().toISOString().split('T')[0];
document.getElementById('s-date').value=new Date().toISOString().split('T')[0];
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');}));
renderHome();
</script>
